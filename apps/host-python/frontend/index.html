<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenHarness Desktop — 前端 MVP</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242837;
    --surface3: #2a2e3f;
    --border: #2e3348;
    --text: #e2e4ed;
    --text-dim: #8b8fa3;
    --accent: #7c6aff;
    --accent-dim: rgba(124,106,255,.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.12);
    --cyan: #22d3ee;
    --radius: 10px;
    --sidebar-w: 280px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ════════════════ Sidebar ════════════════ */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .25s ease;
  }
  .sidebar.hidden {
    transform: translateX(calc(-1 * var(--sidebar-w)));
    position: absolute;
    left: 0; top: 0; bottom: 0;
    z-index: 10;
  }
  .sidebar-header {
    padding: 14px 14px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  #newSessionBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
  }
  #newSessionbtn:hover { background: #6a58e6; }

  .sidebar-search {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-dim); opacity: .5; }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .sidebar-list::-webkit-scrollbar { width: 3px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .session-item {
    padding: 10px 14px;
    cursor: pointer;
    transition: background .1s;
    position: relative;
    user-select: none;
  }
  .session-item:hover { background: var(--surface3); }
  .session-item.active { background: var(--accent-dim); }
  .session-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 6px; bottom: 6px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .session-item .title {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .session-item .meta {
    font-size: 11px;
    color: var(--text-dim);
    opacity: .7;
    display: flex;
    gap: 8px;
  }
  .session-item .actions {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    display: none;
    gap: 4px;
  }
  .session-item:hover .actions { display: flex; }
  .action-btn {
    width: 24px; height: 24px;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .action-btn:hover { color: var(--red); background: var(--red-dim); }
  .action-btn.edit:hover { color: var(--accent); background: var(--accent-dim); }

  .sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ════════════════ Main ════════════════ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .menu-btn {
    width: 30px; height: 30px;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .menu-btn:hover { color: var(--text); }
  .topbar h1 {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar .info {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .topbar .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge.connected { background: var(--green-dim); color: var(--green); }
  .badge.disconnected { background: var(--red-dim); color: var(--red); }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    max-width: 720px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn .2s ease;
    word-wrap: break-word;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; }
  .msg.assistant { align-self: flex-start; background: var(--surface2); word-break: break-word; }
  .msg.system { align-self: center; font-size: 12px; color: var(--text-dim); background: transparent; text-align: center; }
  .msg.error { align-self: center; color: var(--red); background: var(--red-dim); font-size: 12px; }

  .cursor::after { content: '▊'; animation: blink 1s step-end infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Tool card ── */
  .tool-card {
    max-width: 720px;
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn .2s ease;
    width: 100%;
  }
  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface2);
  }
  .tool-header .icon {
    width: 18px; height: 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .tool-header.running .icon { background: var(--amber-dim); color: var(--amber); }
  .tool-header.done .icon { background: var(--green-dim); color: var(--green); }
  .tool-header.error .icon { background: var(--red-dim); color: var(--red); }
  #toolBody {
    padding: 10px 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    color: var(--text-dim);
  }
  .tool-card .body { color: var(--text-dim); }

  /* ── Typing ── */
  .typing-indicator {
    max-width: 720px;
    align-self: flex-start;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .typing-indicator .dots { display: flex; gap: 3px; }
  .typing-indicator .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: dotPulse 1.2s infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: .2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotPulse { 0%,80%,100% { opacity:.3; } 40% { opacity:1; } }

  /* ── Input ── */
  .input-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
  }
  .input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row input:disabled { opacity: .5; }
  .btn-send {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn-send:hover { background: #6a58e6; }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; }
  .btn-stop {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
    white-space: nowrap;
    display: none;
  }
  .btn-stop:hover { background: #e06060; }

  /* ── Welcome ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 8px;
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
  }
  .welcome .logo { font-size: 40px; margin-bottom: 8px; }
  .welcome .sub { font-size: 12px; opacity: .6; }
  .welcome.hidden { display: none !important; }
  .hidden { display: none !important; }

  /* ── Context menu ── */
  .ctx-menu {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    min-width: 150px;
  }
  .ctx-menu button {
    width: 100%;
    padding: 7px 12px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    border-radius: 4px;
  }
  .ctx-menu button:hover { background: var(--surface3); }
  .ctx-menu button.danger { color: var(--red); }
  .ctx-menu button.danger:hover { background: var(--red-dim); }

  /* ── Rename dialog ── */
  .rename-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rename-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 320px;
  }
  .rename-dialog h3 { font-size: 14px; margin-bottom: 12px; }
  .rename-dialog input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .rename-dialog input:focus { border-color: var(--accent); }
  .rename-dialog .btns { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h2>对话</h2>
    <button id="newSessionBtn" title="新对话">+ 新建</button>
  </div>
  <div class="sidebar-search">
    <input id="searchInput" placeholder="🔍 搜索历史对话..." />
  </div>
  <div id="sessionList" class="sidebar-list">
    <div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">加载中...</div>
  </div>
  <div class="sidebar-footer">OpenHarness Desktop MVP</div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Top bar -->
  <div class="topbar">
    <button id="menuBtn" class="menu-btn" title="切换侧边栏">☰</button>
    <h1 id="topbarTitle">OpenHarness Desktop</h1>
    <div class="info">
      <span id="connBadge" class="badge disconnected">● 未连接</span>
      <span id="msgCountInfo" style="font-size:11px;"></span>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="messages">
    <div id="welcomeArea" class="welcome">
      <div class="logo">🛠️</div>
      <div>OpenHarness Desktop MVP</div>
      <div class="sub">HTTP + WebSocket · 基于 OpenHarness 原生事件协议</div>
      <div class="sub" id="statusText">正在连接...</div>
    </div>
  </div>

  <!-- Typing -->
  <div id="typing" class="typing-indicator hidden">
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <span id="typingText">思考中</span>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-row">
      <input id="msgInput" type="text" placeholder="输入消息，用 /help 查看指令..." autocomplete="off" disabled />
      <button id="sendBtn" class="btn-send" disabled>发送</button>
      <button id="stopBtn" class="btn-stop">中断</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div id="ctxMenu" class="ctx-menu hidden"></div>

<!-- Rename dialog -->
<div id="renameOverlay" class="rename-overlay hidden">
  <div class="rename-dialog">
    <h3>✏️ 重命名会话</h3>
    <input id="renameInput" placeholder="输入新的会话标题..." />
    <div class="btns">
      <button class="btn-send" style="background:var(--surface2);color:var(--text);font-size:13px;padding:6px 16px;" id="renameCancel">取消</button>
      <button class="btn-send" style="font-size:13px;padding:6px 16px;" id="renameSave">保存</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 配置
// ═══════════════════════════════════════════════════════
const API_BASE = '';
const WS_BASE = window.location.protocol === 'https:' ? 'wss://' + window.location.host : 'ws://' + window.location.host;

// ═══════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════
const $ = (s) => document.querySelector(s);
const messagesEl    = $('#messages');
const msgInput      = $('#msgInput');
const sendBtn       = $('#sendBtn');
const stopBtn       = $('#stopBtn');
const welcomeArea   = $('#welcomeArea');
const typingEl      = $('#typing');
const typingText    = $('#typingText');
const statusText    = $('#statusText');
const connBadge     = $('#connBadge');
const topbarTitle   = $('#topbarTitle');
const sessionList   = $('#sessionList');
const searchInput   = $('#searchInput');
const newSessionBtn = $('#newSessionBtn');
const menuBtn       = $('#menuBtn');
const sidebar       = $('#sidebar');
const ctxMenu       = $('#ctxMenu');
const renameOverlay = $('#renameOverlay');
const renameInput   = $('#renameInput');
const renameSave    = $('#renameSave');
const renameCancel  = $('#renameCancel');
const msgCountInfo  = $('#msgCountInfo');

// ═══════════════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════════════
let ws = null;
let busy = false;
let currentSessionId = null;
let sessionId = null;
let activeToolCard = null;
let toolCounter = 0;
let sessions = [];

function hideWelcome() {
  if (welcomeArea && !welcomeArea.classList.contains('hidden')) {
    welcomeArea.classList.add('hidden');
  }
}

function scrollBottom() {
  requestAnimationFrame(() => messagesEl.scrollTop = messagesEl.scrollHeight);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function setTyping(text) {
  typingText.textContent = text;
}

function setBusy(state) {
  busy = state;
  msgInput.disabled = state;
  sendBtn.disabled = state;
  sendBtn.style.display = state ? 'none' : '';
  stopBtn.style.display = state ? '' : 'none';
  typingEl.classList.toggle('hidden', !state);
}

function addMsg(role, content) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function createToolCard(toolName, input) {
  hideWelcome();
  toolCounter++;
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.dataset.toolIdx = toolCounter;

  const header = document.createElement('div');
  header.className = 'tool-header running';
  header.innerHTML = `<span class="icon">⏳</span><span>运行 ${esc(toolName)}</span>`;

  const body = document.createElement('div');
  body.className = 'body';
  body.style.color = 'var(--text-dim)';
  body.textContent = '等待结果...';

  card.appendChild(header);
  card.appendChild(body);

  if (input) {
    const inputStr = JSON.stringify(input, null, 2);
    const toggle = document.createElement('button');
    toggle.className = 'tool-input-toggle';
    toggle.textContent = '▶ 查看输入';
    const preview = document.createElement('div');
    preview.className = 'tool-input-preview';
    preview.textContent = inputStr;
    preview.style.display = 'none';
    toggle.onclick = () => {
      preview.style.display = preview.style.display === 'none' ? 'block' : 'none';
      toggle.textContent = preview.style.display === 'none' ? '▶ 查看输入' : '▼ 收起输入';
    };
    card.appendChild(toggle);
    card.appendChild(preview);
  }

  messagesEl.appendChild(card);
  scrollBottom();
  activeToolCard = card;
  return card;
}

function updateToolCard(cardEl, output, isError) {
  if (!cardEl) return;
  const header = cardEl.querySelector('.tool-header');
  const body = cardEl.querySelector('.body');
  if (!header || !body) return;

  const icon = header.querySelector('.icon');
  if (isError) {
    header.className = 'tool-header error';
    icon.textContent = '✗';
    body.style.color = 'var(--red)';
  } else {
    header.className = 'tool-header done';
    icon.textContent = '✓';
    body.style.color = 'var(--green)';
  }

  if (output !== undefined && output !== null) {
    body.textContent = output;
  }
  if (activeToolCard === cardEl) activeToolCard = null;
  scrollBottom();
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
  if (diff < 604800) return `${Math.floor(diff / 86400)} 天前`;
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const normalizedPath = path.startsWith('/api/') ? path : `/api${path}`;
  const res = await fetch(`${API_BASE}${normalizedPath}`, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers },
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadSessions() {
  try {
    sessionList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">加载中...</div>';
    const data = await api('/sessions?limit=50');
    sessions = data.sessions || [];
    renderSessionList();
  } catch (e) {
    sessionList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--red);font-size:12px;">加载失败: ${e.message}</div>`;
  }
}

function renderSessionList(filter = '') {
  const q = filter.toLowerCase();
  const filtered = sessions.filter(s =>
    (s.title || '').toLowerCase().includes(q) ||
    s.session_id.includes(q)
  );

  if (filtered.length === 0) {
    sessionList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">没有对话</div>';
    return;
  }

  sessionList.innerHTML = filtered.map(s => `
    <div class="session-item ${s.session_id === currentSessionId ? 'active' : ''}" data-id="${s.session_id}" onclick="switchSession('${s.session_id}')">
      <div class="title" title="${esc(s.title || '新对话')}">${esc(s.title || '新对话')}</div>
      <div class="meta">
        <span>${s.message_count || 0} 条消息</span>
        <span>${formatTime(s.updated_at)}</span>
      </div>
      <div class="actions">
        <button class="action-btn edit" onclick="event.stopPropagation();renameSession('${s.session_id}')" title="重命名">✏️</button>
        <button class="action-btn" onclick="event.stopPropagation();deleteSession('${s.session_id}')" title="删除">✗</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════
// 会话管理
// ═══════════════════════════════════════════════════════
async function createNewSession() {
  try {
    const data = await api('/sessions', {
      method: 'POST',
      body: JSON.stringify({ title: '' }),
    });
    await switchSession(data.session_id);
  } catch (e) {
    console.error('创建会话失败:', e);
  }
}

async function resumeSession(id) {
  try {
    const data = await api(`/sessions/${id}/resume`, { method: 'POST' });
    
    // 恢复消息到 UI
    clearMessages();
    if (data.messages) {
      data.messages.forEach(m => {
        if (m.role === 'user') {
          addMsg('user', m.content);
        } else if (m.role === 'assistant') {
          addMsg('assistant', m.content);
        } else if (m.role === 'tool_result' || m.role === 'tool') {
          createToolCard(m.tool_name || '?', m.tool_input);
          updateToolCard(activeToolCard || document.querySelector('.tool-card:last-child'), m.content || m.tool_output, m.is_error);
        } else if (m.role === 'system') {
          addMsg('system', m.content);
        }
      });
    }
    
    // 更新 session id 并连接 WS
    sessionId = id;
    currentSessionId = id;
    connect();
    
    // 更新 topbar
    topbarTitle.textContent = data.session.title || '新对话';
    msgCountInfo.textContent = `${data.session.message_count} 条消息`;
    loadSessions();
  } catch (e) {
    console.error('恢复会话失败:', e);
    addMsg('error', '恢复会话失败: ' + e.message);
  }
}

async function deleteSession(id) {
  if (!confirm('确定删除这个会话？')) return;
  try {
    await api(`/sessions/${id}`, { method: 'DELETE' });
    if (currentSessionId === id) {
      createNewSession();
    }
    loadSessions();
  } catch (e) {
    console.error('删除失败:', e);
  }
}

async function renameSession(id) {
  const title = prompt('新标题:');
  if (!title) return;
  try {
    await api(`/sessions/${id}/title`, {
      method: 'PUT',
      body: JSON.stringify({ title }),
    });
    loadSessions();
    if (currentSessionId === id) {
      topbarTitle.textContent = title;
    }
  } catch (e) {
    console.error('重命名失败:', e);
  }
}

async function switchSession(id) {
  if (id === currentSessionId) return;
  
  // 关闭当前 WS 连接
  if (ws && ws.readyState === WebSocket.OPEN) {
    sendJson('session.shutdown', {});
  }
  
  // 切换
  sessionId = id;
  currentSessionId = id;
  
  // 恢复
  await resumeSession(id);
  
  // 高亮
  loadSessions();
}

// ═══════════════════════════════════════════════════════
// 消息显示
// ═══════════════════════════════════════════════════════
function clearMessages() {
  messagesEl.innerHTML = '';
  welcomeArea.classList.remove('hidden');
  activeToolCard = null;
  toolCounter = 0;
  window._assistantMsg = null;
}

// ═══════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════
function connect() {
  statusText.textContent = '正在连接...';
  
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.close();
  }

  ws = new WebSocket(`${WS_BASE}/ws/${sessionId}`);

  ws.onopen = () => {
    connBadge.className = 'badge connected';
    connBadge.textContent = '● 已连接';
    statusText.textContent = '已连接 · 准备就绪';
    setBusy(false);
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleEvent(data);
    } catch (err) {
      console.error('[WS] parse error:', err, e.data);
    }
  };

  ws.onerror = () => {
    statusText.textContent = '连接失败';
  };

  ws.onclose = () => {
    connBadge.className = 'badge disconnected';
    connBadge.textContent = '● 未连接';
    setBusy(false);
  };
}

function sendJson(type, payload) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type, payload }));
}

// ═══════════════════════════════════════════════════════
// 事件渲染
// ═══════════════════════════════════════════════════════
function handleEvent(data) {
  const type = data.type;
  const payload = data.payload || {};

  switch (type) {
    case 'session.ready':
      setBusy(false);
      msgInput.focus();
      break;

    case 'session.run_complete':
      setBusy(false);
      addMsg('system', '— 本轮完成 —');
      window._assistantMsg = null;
      // 刷新会话列表（标题可能已自动生成）
      loadSessions();
      break;

    case 'session.closed':
      setBusy(false);
      addMsg('system', '🔌 会话已关闭');
      break;

    case 'session.busy':
      addMsg('error', '⏳ 会话繁忙中');
      break;

    case 'assistant.delta': {
      setTyping('思考中');
      if (!window._assistantMsg) {
        window._assistantMsg = document.createElement('div');
        window._assistantMsg.className = 'msg assistant cursor';
        window._assistantMsg.textContent = '';
        messagesEl.appendChild(window._assistantMsg);
      }
      window._assistantMsg.textContent += (payload.text || '');
      scrollBottom();
      break;
    }

    case 'assistant.complete': {
      setTyping('');
      if (window._assistantMsg) {
        window._assistantMsg.classList.remove('cursor');
        window._assistantMsg = null;
      }
      scrollBottom();
      break;
    }

    case 'tool.started': {
      const card = createToolCard(payload.tool_name, payload.tool_input);
      setTyping(`正在执行 ${payload.tool_name}`);
      break;
    }

    case 'tool.completed': {
      if (activeToolCard) {
        updateToolCard(activeToolCard, payload.output, payload.is_error);
      } else {
        const card = createToolCard(payload.tool_name, {});
        updateToolCard(card, payload.output, payload.is_error);
      }
      break;
    }

    case 'transcript.item': {
      const role = payload.role;
      const text = payload.text || '';
      if (role === 'user') addMsg('user', text);
      else if (role === 'system') addMsg('system', text);
      break;
    }

    case 'approval.request':
      showApprovalModal(payload.request_id, payload.tool_name, payload.reason);
      setBusy(false);
      setTyping('等待审批');
      break;

    case 'question.request':
      showQuestionModal(payload.request_id, payload.question);
      setBusy(false);
      setTyping('等待回答');
      break;

    case 'error':
      addMsg('error', '❌ ' + (payload.message || JSON.stringify(payload)));
      setBusy(false);
      break;

    default:
      console.log('Event:', type, payload);
  }
}

function showApprovalModal(requestId, toolName, reason) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'approval-modal';
  div.innerHTML = `
    <h3>⚠️ 工具执行审批</h3>
    <p>Agent 请求使用 <strong>${esc(toolName)}</strong><br>${esc(reason)}</p>
    <div class="btns">
      <button class="btn-allow" style="padding:6px 18px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;background:var(--green);color:#000;">允许</button>
      <button class="btn-deny" style="padding:6px 18px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;background:var(--surface2);color:var(--text);">拒绝</button>
    </div>
  `;
  messagesEl.appendChild(div);
  div.querySelector('.btn-allow').addEventListener('click', () => {
    div.remove();
    sendJson('permission.response', { request_id: requestId, allowed: true });
  });
  div.querySelector('.btn-deny').addEventListener('click', () => {
    div.remove();
    sendJson('permission.response', { request_id: requestId, allowed: false });
  });
  scrollBottom();
}

function showQuestionModal(requestId, question) {
  hideWelcome();
  const div = document.createElement('div');
  div.style.cssText = 'max-width:720px;align-self:center;background:var(--surface);border:1px solid var(--cyan);border-radius:10px;padding:16px 20px;animation:fadeIn .3s ease;';
  div.innerHTML = `
    <h3 style="font-size:14px;color:var(--cyan);margin-bottom:6px;">💬 Agent 提问</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">${esc(question)}</p>
    <div style="display:flex;gap:8px;">
      <input type="text" class="q-input" placeholder="输入回复..." style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;" />
      <button class="q-send" style="background:var(--cyan);color:#000;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;">回复</button>
    </div>
  `;
  messagesEl.appendChild(div);
  const input = div.querySelector('.q-input');
  const btn = div.querySelector('.q-send');
  const doReply = () => {
    const answer = input.value.trim();
    div.remove();
    sendJson('question.response', { request_id: requestId, answer });
  };
  btn.addEventListener('click', doReply);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doReply(); });
  input.focus();
  scrollBottom();
}

// ═══════════════════════════════════════════════════════
// 输入交互
// ═══════════════════════════════════════════════════════
function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  addMsg('user', text);
  sendJson('session.submit', { text });
  msgInput.value = '';
  setBusy(true);
  window._assistantMsg = null;
  activeToolCard = null;
}

function stopSession() {
  sendJson('session.shutdown', {});
  setBusy(false);
}

sendBtn.addEventListener('click', sendMsg);
stopBtn.addEventListener('click', stopSession);
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// ═══════════════════════════════════════════════════════
// 侧边栏
// ═══════════════════════════════════════════════════════
menuBtn.addEventListener('click', () => {
  sidebar.classList.toggle('hidden');
});

newSessionBtn.addEventListener('click', createNewSession);

searchInput.addEventListener('input', (e) => {
  renderSessionList(e.target.value);
});

// ═══════════════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════════════
async function init() {
  await loadSessions();
  
  // 如果有历史会话，恢复最后一个活跃的
  const lastActive = sessions.find(s => s.status === 'active') || sessions[0];
  if (lastActive) {
    await switchSession(lastActive.session_id);
  } else {
    await createNewSession();
  }
}

init();
</script>
