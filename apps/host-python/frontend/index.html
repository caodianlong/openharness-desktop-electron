<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenHarness Desktop — 前端 MVP</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({ breaks: true, gfm: true });
</script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242837;
    --surface3: #2a2e3f;
    --border: #2e3348;
    --text: #e2e4ed;
    --text-dim: #8b8fa3;
    --accent: #7c6aff;
    --accent-dim: rgba(124,106,255,.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.12);
    --cyan: #22d3ee;
    --radius: 10px;
    --sidebar-w: 280px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ════════════════ Sidebar ════════════════ */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .25s ease;
  }
  .sidebar.hidden {
    transform: translateX(calc(-1 * var(--sidebar-w)));
    position: absolute;
    left: 0; top: 0; bottom: 0;
    z-index: 10;
  }
  .sidebar-header {
    padding: 14px 14px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  #newSessionBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
  }
  #newSessionbtn:hover { background: #6a58e6; }

  .sidebar-search {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-dim); opacity: .5; }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .sidebar-list::-webkit-scrollbar { width: 3px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .session-item {
    padding: 10px 14px;
    cursor: pointer;
    transition: background .1s;
    position: relative;
    user-select: none;
  }
  .session-item:hover { background: var(--surface3); }
  .session-item.active { background: var(--accent-dim); }
  .session-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 6px; bottom: 6px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .session-item .title {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .session-item .meta {
    font-size: 11px;
    color: var(--text-dim);
    opacity: .7;
    display: flex;
    gap: 8px;
  }
  .session-item .actions {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    display: none;
    gap: 4px;
  }
  .session-item:hover .actions { display: flex; }
  .action-btn {
    width: 24px; height: 24px;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .action-btn:hover { color: var(--red); background: var(--red-dim); }
  .action-btn.edit:hover { color: var(--accent); background: var(--accent-dim); }

  .sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
  .sidebar-secondary-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .sidebar-secondary-btn:hover {
    background: var(--surface3);
    border-color: rgba(124,106,255,.35);
    transform: translateY(-1px);
  }
  .sidebar-footer-actions {
    padding: 10px 14px 0;
    border-top: 1px solid var(--border);
  }
  .artifact-panel-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .artifact-panel-toggle:hover {
    background: var(--surface3);
    border-color: rgba(34,211,238,.4);
    transform: translateY(-1px);
  }
  .artifact-panel-toggle .artifact-toggle-meta {
    font-size: 11px;
    color: var(--text-dim);
  }
  .artifact-panel {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(20,24,34,.92), rgba(15,17,23,.96));
    overflow: hidden;
  }
  .artifact-panel.hidden { display: none !important; }
  .artifact-panel-header {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: .3px;
  }
  .artifact-list {
    max-height: 240px;
    overflow-y: auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .artifact-empty {
    padding: 16px 10px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }
  .artifact-item {
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,.03);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .artifact-item:hover {
    background: rgba(124,106,255,.12);
    border-color: rgba(124,106,255,.28);
    transform: translateY(-1px);
  }
  .artifact-item.active {
    background: rgba(34,211,238,.12);
    border-color: rgba(34,211,238,.32);
  }
  .artifact-item-title {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .artifact-item-meta {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .approval-queue-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .approval-queue-btn:hover {
    background: var(--surface3);
    border-color: rgba(124,106,255,.45);
    transform: translateY(-1px);
  }
  .approval-badge {
    min-width: 22px;
    height: 22px;
    padding: 0 7px;
    border-radius: 999px;
    background: var(--red-dim);
    color: var(--red);
    font-size: 11px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .approval-badge.hidden {
    display: none !important;
  }

  /* ════════════════ Main ════════════════ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .menu-btn {
    width: 30px; height: 30px;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .menu-btn:hover { color: var(--text); }
  .topbar h1 {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar .info {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .topbar .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge.connected { background: var(--green-dim); color: var(--green); }
  .badge.disconnected { background: var(--red-dim); color: var(--red); }
  .badge.permission-mode {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    transition: transform .15s ease, filter .15s ease;
  }
  .badge.permission-mode:hover {
    transform: translateY(-1px);
    filter: brightness(1.08);
  }
  .badge.permission-safe { background: var(--green-dim); color: var(--green); }
  .badge.permission-balanced { background: var(--amber-dim); color: var(--amber); }
  .badge.permission-full_auto { background: var(--red-dim); color: var(--red); }
  .permission-menu {
    position: fixed;
    min-width: 180px;
    padding: 6px;
    background: rgba(20, 24, 34, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,.38);
    z-index: 120;
  }
  .permission-menu.hidden { display: none !important; }
  .permission-option {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 12px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .permission-option:hover {
    background: rgba(124,106,255,.18);
  }
  .permission-option.active {
    background: rgba(124,106,255,.24);
    color: #fff;
  }
  .permission-option small {
    color: var(--text-dim);
    font-size: 11px;
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    max-width: 720px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn .2s ease;
    word-wrap: break-word;
  }
  .copyable {
    position: relative;
  }
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .15s ease, transform .15s ease, background .15s ease;
    backdrop-filter: blur(8px);
    z-index: 2;
  }
  .copyable:hover .copy-btn,
  .copy-btn:focus-visible {
    opacity: 1;
  }
  .copy-btn:hover {
    background: rgba(124,106,255,.28);
    transform: scale(1.04);
  }
  .msg.assistant.has-copy {
    padding-right: 46px;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; }
  .msg.assistant { align-self: flex-start; background: var(--surface2); word-break: break-word; }
  .msg.assistant p { margin: 0 0 0.5em; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant pre {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; overflow-x: auto; margin: 0.5em 0; font-size: 13px; line-height: 1.5;
  }
  .msg.assistant code {
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    font-size: 0.9em; background: var(--bg); padding: 2px 6px; border-radius: 4px;
  }
  .msg.assistant pre code { background: none; padding: 0; }
  .msg.assistant ul, .msg.assistant ol { padding-left: 1.5em; margin: 0.3em 0; }
  .msg.assistant blockquote {
    border-left: 3px solid var(--accent); padding-left: 12px; margin: 0.5em 0;
    color: var(--text-dim);
  }
  .msg.assistant a { color: var(--accent); text-decoration: underline; }
  .msg.system { align-self: center; font-size: 12px; color: var(--text-dim); background: transparent; text-align: center; }
  .msg.error { align-self: center; color: var(--red); background: var(--red-dim); font-size: 12px; }

  .cursor::after { content: '▊'; animation: blink 1s step-end infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Tool card ── */
  .tool-card {
    max-width: 520px;
    min-width: 280px;
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    animation: fadeIn .2s ease;
  }
  .tool-card:not(:last-child) {
    margin-bottom: 4px;
  }
  .tool-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface2);
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .tool-header:hover { background: var(--surface3); }
  .tool-header::after {
    content: '▾';
    color: var(--text-dim);
    font-size: 12px;
    transition: transform .2s;
  }
  .tool-header:active::after { transform: rotate(180deg); }
  .tool-header .left { display: flex; align-items: center; gap: 8px; }
  .tool-header .icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .tool-header.running .icon { background: var(--amber-dim); color: var(--amber); }
  .tool-header.done .icon { background: var(--green-dim); color: var(--green); }
  .tool-header.error .icon { background: var(--red-dim); color: var(--red); }
  .tool-card .body {
    max-height: 0;
    overflow: hidden;
    padding: 0 14px;
    word-wrap: break-word;
    transition: max-height .3s ease, padding .3s ease;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    color: var(--text-dim);
  }
  .tool-card .body.copyable {
    padding-right: 46px;
  }
  .tool-card .body.copyable .copy-btn {
    top: 10px;
    right: 10px;
  }
  .tool-card .summary {
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }
  .tool-card:hover .body,
  .tool-card.expanded .body {
    max-height: 300px;
    overflow-y: auto;
    padding: 8px 14px;
    background: rgba(0,0,0,.15);
    border-top: 1px solid var(--border);
  }
  .tool-card .tool-input-toggle {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    cursor: pointer;
    margin: 2px 12px 6px;
  }
  .tool-card .tool-input-preview {
    display: none;
    margin: 0 2px 4px;
    font-size: 11px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Typing ── */
  .typing-indicator {
    max-width: 720px;
    align-self: flex-start;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .typing-indicator .dots { display: flex; gap: 3px; }
  .typing-indicator .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: dotPulse 1.2s infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: .2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotPulse { 0%,80%,100% { opacity:.3; } 40% { opacity:1; } }

  /* ── Input ── */
  .input-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }
  .input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row input:disabled { opacity: .5; }
  .btn-send {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn-send:hover { background: #6a58e6; }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; }
  .btn-stop {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
    white-space: nowrap;
    display: none;
  }
  .btn-stop:hover { background: #e06060; }

  /* ── Slash commands ── */
  .slash-popup {
    position: absolute;
    left: 0;
    right: 84px;
    bottom: calc(100% + 10px);
    background: rgba(26, 29, 39, 0.92);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(124,106,255,.18);
    border-radius: 14px;
    box-shadow: 0 18px 48px rgba(0,0,0,.4);
    overflow: hidden;
    z-index: 40;
    animation: slashFadeIn .16s ease;
  }
  @keyframes slashFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slash-popup.hidden { display: none !important; }
  .slash-list {
    max-height: 250px;
    overflow-y: auto;
    padding: 8px;
  }
  .slash-list::-webkit-scrollbar { width: 5px; }
  .slash-list::-webkit-scrollbar-thumb { background: rgba(124,106,255,.22); border-radius: 999px; }
  .slash-item {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 12px 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .12s ease, transform .12s ease;
  }
  .slash-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 4px;
    border-radius: 0 999px 999px 0;
    background: var(--accent);
    opacity: .9;
  }
  .slash-item:hover,
  .slash-item.active {
    background: rgba(124,106,255,.18);
  }
  .slash-item-command {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .slash-item-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .slash-empty {
    padding: 14px 16px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── Welcome ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 8px;
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
  }
  .welcome .logo { font-size: 40px; margin-bottom: 8px; }
  .welcome .sub { font-size: 12px; opacity: .6; }
  .welcome.hidden { display: none !important; }
  .hidden { display: none !important; }

  /* ── Approval queue / modal ── */

  .approval-panel-close {

  .approval-list {

  <!-- Typing -->

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// 配置
// ═══════════════════════════════════════════════════════
const API_BASE = '';
const WS_BASE = window.location.protocol === 'https:' ? 'wss://' + window.location.host : 'ws://' + window.location.host;

// ═══════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════
const $ = (s) => document.querySelector(s);
const messagesEl    = $('#messages');
const msgInput      = $('#msgInput');
const sendBtn       = $('#sendBtn');
const stopBtn       = $('#stopBtn');
const welcomeArea   = $('#welcomeArea');
const typingEl      = $('#typing');
const typingText    = $('#typingText');
const statusText    = $('#statusText');
const connBadge     = $('#connBadge');
const topbarTitle   = $('#topbarTitle');
const sessionList   = $('#sessionList');
const searchInput   = $('#searchInput');
const newSessionBtn = $('#newSessionBtn');
const menuBtn       = $('#menuBtn');
const sidebar       = $('#sidebar');
const ctxMenu       = $('#ctxMenu');
const renameOverlay = $('#renameOverlay');
const renameInput   = $('#renameInput');
const renameSave    = $('#renameSave');
const renameCancel  = $('#renameCancel');
const msgCountInfo  = $('#msgCountInfo');
const approvalQueueBtn = $('#approvalQueueBtn');
const approvalBadge = $('#approvalBadge');
const approvalPanel = $('#approvalPanel');
const approvalPanelClose = $('#approvalPanelClose');
const approvalList = $('#approvalList');
const artifactPanelToggle = $('#artifactPanelToggle');
const artifactPanel = $('#artifactPanel');
const artifactList = $('#artifactList');
const artifactCount = $('#artifactCount');
const exportSessionBtn = $('#exportSessionBtn');
const toastEl = $('#toast');

const SLASH_COMMANDS = [
  { command: '/help', description: '显示可用命令列表' },
  { command: '/clear', description: '清空当前对话历史' },
  { command: '/compact [N]', description: '压缩对话上下文（保留最近 N 条，默认 6）' },
  { command: '/model show', description: '显示当前模型' },
  { command: '/model set MODEL', description: '设置模型' },
  { command: '/status', description: '显示会话状态' },
  { command: '/usage', description: '显示 token 使用统计' },
  { command: '/cost', description: '显示估计成本' },
  { command: '/stats', description: '显示会话统计' },
  { command: '/summary [N]', description: '总结最近 N 条对话' },
  { command: '/version', description: '显示 OpenHarness 版本' },
  { command: '/config show', description: '显示配置' },
  { command: '/config set KEY VALUE', description: '设置配置项' },
  { command: '/permissions show', description: '显示权限模式' },
  { command: '/permissions set MODE', description: '设置权限模式（default/plan/full_auto）' },
  { command: '/plan on', description: '进入计划模式' },
  { command: '/plan off', description: '退出计划模式' },
  { command: '/fast on/off/toggle', description: '快速模式' },
  { command: '/effort low/medium/high', description: '设置推理努力程度' },
  { command: '/passes N', description: '设置推理轮数 (1-8)' },
  { command: '/theme show', description: '显示主题' },
  { command: '/theme set THEME', description: '设置主题' },
  { command: '/login', description: '显示认证状态' },
  { command: '/logout', description: '清除 API 密钥' },
  { command: '/vim on/off/toggle', description: 'Vim 模式' },
  { command: '/voice on/off/toggle', description: '语音模式' },
  { command: '/doctor', description: '环境诊断' },
  { command: '/files', description: '列出工作区文件' },
  { command: '/diff', description: '显示 git diff' },
  { command: '/diff full', description: '显示完整 diff' },
  { command: '/branch show', description: '显示当前分支' },
  { command: '/branch list', description: '列出分支' },
  { command: '/commit MSG', description: '快速提交' },
  { command: '/rewind [N]', description: '撤回最近 N 轮对话' },
  { command: '/copy', description: '复制最后一条回复' },
  { command: '/resume', description: '恢复最近会话' },
  { command: '/session show', description: '显示会话存储信息' },
  { command: '/session ls', description: '列体会话文件' },
  { command: '/tag NAME', description: '给当前会话打标签' },
  { command: '/init', description: '初始化项目 OpenHarness 配置' },
  { command: '/memory list', description: '列出记忆文件' },
  { command: '/memory add TITLE :: CONTENT', description: '添加记忆' },
  { command: '/tasks list', description: '列出后台任务' },
  { command: '/tasks run CMD', description: '执行后台任务' },
  { command: '/agents', description: '列出代理任务' },
  { command: '/skills', description: '列出可用技能' },
  { command: '/plugins', description: '列出插件' },
  { command: '/mcp', description: '显示 MCP 状态' },
  { command: '/issue show', description: '显示项目 issue 上下文' },
  { command: '/issue clear', description: '清除 issue 上下文' },
  { command: '/pr_comments show', description: '显示 PR 评论上下文' },
  { command: '/export', description: '导出会话记录' },
  { command: '/share', description: '创建可分享的快照快照' },
  { command: '/exit', description: '退出（会话）' },
  { command: '/quit', description: '退出（会话）' },
];

const slashPopup = document.createElement('div');
slashPopup.className = 'slash-popup hidden';
slashPopup.innerHTML = '<div class="slash-list"></div>';
msgInput.parentElement.appendChild(slashPopup);
const slashList = slashPopup.querySelector('.slash-list');

// ═══════════════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════════════
let ws = null;
let busy = false;
let currentSessionId = null;
let sessionId = null;
let activeToolCard = null;
let toolCounter = 0;
let sessions = [];
let slashMatches = [];
let slashSelectedIndex = 0;
let pendingUserEcho = null;
let currentPermissionMode = 'safe';
let pendingApprovals = [];
let artifacts = [];
let selectedArtifactId = null;
let toastTimer = null;

const PERMISSION_MODE_META = {
  safe: { label: '🔒 Safe', className: 'permission-safe', status: '安全模式' },
  balanced: { label: '⚖️ Balanced', className: 'permission-balanced', status: '平衡模式' },
  full_auto: { label: '🚀 Full Auto', className: 'permission-full_auto', status: '全自动模式' },
};

const permissionBadge = document.createElement('span');
permissionBadge.id = 'permissionBadge';
permissionBadge.className = 'badge permission-mode permission-safe';
permissionBadge.textContent = PERMISSION_MODE_META.safe.label;
permissionBadge.title = '点击切换权限模式';
connBadge.insertAdjacentElement('afterend', permissionBadge);

const permissionMenu = document.createElement('div');
permissionMenu.id = 'permissionMenu';
permissionMenu.className = 'permission-menu hidden';
document.body.appendChild(permissionMenu);

function getSlashQuery(text) {
  const trimmed = text.trimStart();
  if (!trimmed.startsWith('/')) return null;
  if (/\s{2,}/.test(trimmed)) return null;
  return trimmed.slice(1).toLowerCase();
}

function hideSlashPopup() {
  slashPopup.classList.add('hidden');
  slashMatches = [];
  slashSelectedIndex = 0;
}

function getSlashMatches(query) {
  if (query === null) return [];
  if (!query) return SLASH_COMMANDS.slice(0, 12);
  return SLASH_COMMANDS.filter(({ command, description }) => {
    const haystack = `${command} ${description}`.toLowerCase();
    return haystack.includes(query);
  }).slice(0, 12);
}

function applySlashCommand(command) {
  msgInput.value = command;
  hideSlashPopup();
  msgInput.focus();
  requestAnimationFrame(() => {
    const len = msgInput.value.length;
    msgInput.setSelectionRange(len, len);
  });
}

function renderSlashPopup() {
  const query = getSlashQuery(msgInput.value);
  slashMatches = getSlashMatches(query);

  if (query === null || slashMatches.length === 0) {
    if (query !== null && msgInput.value.trimStart().startsWith('/')) {
      slashPopup.classList.remove('hidden');
      slashList.innerHTML = '<div class="slash-empty">没有匹配的命令</div>';
    } else {
      hideSlashPopup();
    }
    return;
  }

  if (slashSelectedIndex >= slashMatches.length) {
    slashSelectedIndex = 0;
  }

  slashList.innerHTML = slashMatches.map((item, index) => `
    <div class="slash-item ${index === slashSelectedIndex ? 'active' : ''}" data-index="${index}">
      <div class="slash-item-command">${esc(item.command)}</div>
      <div class="slash-item-desc">${esc(item.description)}</div>
    </div>
  `).join('');

  slashPopup.classList.remove('hidden');

  const activeItem = slashList.querySelector('.slash-item.active');
  if (activeItem) {
    activeItem.scrollIntoView({ block: 'nearest' });
  }
}

function hideWelcome() {
  if (welcomeArea && !welcomeArea.classList.contains('hidden')) {
    welcomeArea.classList.add('hidden');
  }
}

function getPermissionModeMeta(mode) {
  return PERMISSION_MODE_META[mode] || PERMISSION_MODE_META.safe;
}

function renderPermissionMenu() {
  permissionMenu.innerHTML = Object.entries(PERMISSION_MODE_META).map(([mode, meta]) => `
    <button class="permission-option ${mode === currentPermissionMode ? 'active' : ''}" data-mode="${mode}">
      <span>${esc(meta.label)}</span>
      <small>${esc(meta.status)}</small>
    </button>
  `).join('');
}

function setPermissionModeUI(mode) {
  const nextMode = PERMISSION_MODE_META[mode] ? mode : 'safe';
  currentPermissionMode = nextMode;
  const meta = getPermissionModeMeta(nextMode);
  permissionBadge.className = `badge permission-mode ${meta.className}`;
  permissionBadge.textContent = meta.label;
  permissionBadge.dataset.mode = nextMode;
  renderPermissionMenu();
}

function hidePermissionMenu() {
  permissionMenu.classList.add('hidden');
}

function showPermissionMenu() {
  renderPermissionMenu();
  const rect = permissionBadge.getBoundingClientRect();
  permissionMenu.style.top = `${rect.bottom + 8}px`;
  permissionMenu.style.left = `${Math.max(12, rect.right - 180)}px`;
  permissionMenu.classList.remove('hidden');
}

async function updatePermissionMode(mode) {
  if (!currentSessionId || mode === currentPermissionMode) {
    hidePermissionMenu();
    return;
  }

  const prevMode = currentPermissionMode;
  setPermissionModeUI(mode);
  try {
    await api(`/sessions/${currentSessionId}/permission`, {
      method: 'PUT',
      body: JSON.stringify({ mode }),
    });
    statusText.textContent = `已连接 · ${getPermissionModeMeta(mode).status}`;
    hidePermissionMenu();
  } catch (e) {
    setPermissionModeUI(prevMode);
    addMsg('error', '权限模式切换失败: ' + e.message);
    hidePermissionMenu();
  }
}

function scrollBottom() {
  requestAnimationFrame(() => messagesEl.scrollTop = messagesEl.scrollHeight);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function setTyping(text) {
  typingText.textContent = text;
}

function setBusy(state) {
  busy = state;
  msgInput.disabled = state;
  sendBtn.disabled = state;
  sendBtn.style.display = state ? 'none' : '';
  stopBtn.style.display = state ? '' : 'none';
  typingEl.classList.toggle('hidden', !state);
}

function formatApprovalTime(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleString('zh-CN', {
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
  });
}

function renderMd(s) {
  return typeof marked !== 'undefined' ? marked.parse(s || '') : esc(s);
}

function summarizeArtifactContent(content) {
  const normalized = (content || '').replace(/\s+/g, ' ').trim();
  if (!normalized) return '空产物';
  return normalized.length > 80 ? `${normalized.slice(0, 80)}…` : normalized;
}

function showToast(message) {
  if (!toastEl) return;
  toastEl.textContent = message;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, 2000);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text || '');
    showToast('已复制到剪贴板');
  } catch (err) {
    console.error('复制失败:', err);
    addMsg('error', '复制失败: 无法写入剪贴板');
  }
}

function attachCopyButton(container, getText) {
  if (!container || container.querySelector(':scope > .copy-btn')) return;
  container.classList.add('copyable');
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.type = 'button';
  btn.title = '复制';
  btn.setAttribute('aria-label', '复制');
  btn.textContent = '📋';
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    copyText(typeof getText === 'function' ? getText() : '');
  });
  container.appendChild(btn);
}

function addMsg(role, content) {

    div.innerHTML = renderMd(content);

    attachCopyButton(div, () => div.dataset.rawContent || div.textContent || '');

async function loadArtifacts(sessionIdToLoad = currentSessionId) {

async function showArtifact(artifactId) {

    selectedArtifactId = artifact.artifact_id;
    renderArtifactList();
    clearMessages();
    hideWelcome();
    addMsg('system', `查看产物 · ${artifact.tool_name || '未命名工具'} · ${artifact.artifact_type || 'text'}`);

      addMsg('system', `文件路径：${artifact.file_path}`);

function createToolCard(toolName, input) {
  hideWelcome();
  toolCounter++;
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.dataset.toolIdx = toolCounter;
  card.dataset.toolName = toolName || '';

  const header = document.createElement('div');
  header.className = 'tool-header running';
  header.innerHTML = `<span class="icon">⏳</span><span>运行 ${esc(toolName)}</span>`;

  const body = document.createElement('div');
  body.className = 'body';
  body.style.color = 'var(--text-dim)';
  body.textContent = '等待结果...';
  body.dataset.copyText = '等待结果...';
  attachCopyButton(body, () => body.dataset.copyText || body.textContent || '');

  card.appendChild(header);
  card.appendChild(body);

  if (input) {
    const inputStr = JSON.stringify(input, null, 2);
    const toggle = document.createElement('button');
    toggle.className = 'tool-input-toggle';
    toggle.textContent = '▶ 查看输入';
    const preview = document.createElement('div');
    preview.className = 'tool-input-preview';
    preview.textContent = inputStr;
    preview.style.display = 'none';
    toggle.onclick = () => {
      preview.style.display = preview.style.display === 'none' ? 'block' : 'none';
      toggle.textContent = preview.style.display === 'none' ? '▶ 查看输入' : '▼ 收起输入';
    };
    card.appendChild(toggle);
    card.appendChild(preview);
  }

  messagesEl.appendChild(card);
  scrollBottom();
  activeToolCard = card;
  return card;
}

function updateToolCard(cardEl, output, isError) {
  if (!cardEl) return;
  const header = cardEl.querySelector('.tool-header');
  const body = cardEl.querySelector('.body');
  if (!header || !body) return;

  const icon = header.querySelector('.icon');
  if (isError) {
    header.className = 'tool-header error';
    icon.textContent = '✗';
    body.style.color = 'var(--red)';
  } else {
    header.className = 'tool-header done';
    icon.textContent = '✓';
    body.style.color = 'var(--green)';
  }

  if (output !== undefined && output !== null) {
    const text = typeof output === 'string' ? output : JSON.stringify(output, null, 2);
    body.textContent = text;
    body.dataset.copyText = text;
  }
  if (activeToolCard === cardEl) activeToolCard = null;
  scrollBottom();
}

function padNumber(n) {
  return String(n).padStart(2, '0');
}

function formatExportTimestamp(date = new Date()) {
  return `${date.getFullYear()}${padNumber(date.getMonth() + 1)}${padNumber(date.getDate())}-${padNumber(date.getHours())}${padNumber(date.getMinutes())}${padNumber(date.getSeconds())}`;
}

function sanitizeFilenamePart(value) {
  return (value || 'session')
    .replace(/[\\/:*?"<>|]+/g, '-')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 60) || 'session';
}

function formatMarkdownBlock(content) {
  if (!content) return '_空内容_';
  return String(content).replace(/\r\n/g, '\n').trim() || '_空内容_';
}

function sessionToMarkdown(session, messages = []) {
  const lines = [`# ${session?.title || '未命名会话'}`, ''];
  messages.forEach((msg, index) => {
    const role = msg.role;
    if (role === 'user') {
      lines.push(`## 用户 ${index + 1}`, '', formatMarkdownBlock(msg.content), '');
      return;
    }
    if (role === 'assistant') {
      lines.push(`## AI ${index + 1}`, '', formatMarkdownBlock(msg.content), '');
      return;
    }
    if (role === 'tool' || role === 'tool_result') {
      const toolName = msg.tool_name || '未知工具';
      lines.push(`## 工具 ${index + 1} · ${toolName}`, '');
      if (msg.tool_input) {
        lines.push('### 输入', '', '```json', JSON.stringify(msg.tool_input, null, 2), '```', '');
      }
      const output = msg.content ?? msg.tool_output ?? '';
      lines.push('### 输出', '', '```', String(output), '```', '');
      return;
    }
    if (role === 'system') {
      lines.push(`## 系统 ${index + 1}`, '', formatMarkdownBlock(msg.content), '');
    }
  });
  return lines.join('\n');
}

async function exportCurrentSession() {
  if (!currentSessionId) {
    addMsg('error', '暂无可导出的会话');
    return;
  }
  try {
    const data = await api(`/sessions/${currentSessionId}/resume`, { method: 'POST' });
    const session = data.session || sessions.find(s => s.session_id === currentSessionId) || {};
    const markdown = sessionToMarkdown(session, data.messages || []);
    const fileName = `${sanitizeFilenamePart(session.title || topbarTitle.textContent || 'session')}-${formatExportTimestamp()}.md`;
    const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
    showToast('会话已导出');
  } catch (e) {
    console.error('导出会话失败:', e);
    addMsg('error', '导出会话失败: ' + e.message);
  }
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
  if (diff < 604800) return `${Math.floor(diff / 86400)} 天前`;
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function updateApprovalBadge() {
  const count = pendingApprovals.length;
  approvalBadge.textContent = String(count);
  approvalBadge.classList.toggle('hidden', count === 0);
}

function removePendingApproval(approvalId) {
  pendingApprovals = pendingApprovals.filter(item => item.approval_id !== approvalId);
  document.querySelectorAll(`.approval-modal[data-approval-id="${approvalId}"]`).forEach(el => el.remove());
  renderApprovalList();
  updateApprovalBadge();
}

function renderApprovalList() {
  if (!pendingApprovals.length) {
    approvalList.innerHTML = '<div class="approval-empty">暂无待审批项</div>';
    return;
  }

  approvalList.innerHTML = pendingApprovals.map(item => `
    <div class="approval-item" data-approval-id="${item.approval_id}">
      <div class="approval-item-head">
        <div class="approval-item-tool">${esc(item.tool_name || '未知工具')}</div>
        <div class="approval-item-time">${esc(formatApprovalTime(item.requested_at))}</div>
      </div>
      <div class="approval-item-reason">${esc(item.reason || '无审批理由')}</div>
      <div class="approval-item-actions">
        <button class="approval-action-btn allow" data-decision="allow" data-approval-id="${item.approval_id}">批准</button>
        <button class="approval-action-btn deny" data-decision="deny" data-approval-id="${item.approval_id}">拒绝</button>
      </div>
    </div>
  `).join('');
}

function upsertApproval(item) {
  if (!item?.approval_id) return;
  const idx = pendingApprovals.findIndex(entry => entry.approval_id === item.approval_id);
  if (idx >= 0) {
    pendingApprovals[idx] = { ...pendingApprovals[idx], ...item };
  } else {
    pendingApprovals.push(item);
  }
  pendingApprovals.sort((a, b) => (a.requested_at || 0) - (b.requested_at || 0));
  renderApprovalList();
  updateApprovalBadge();
}

async function loadPendingApprovals(sessionIdToLoad = currentSessionId) {
  if (!sessionIdToLoad) return;
  try {
    const data = await api(`/sessions/${sessionIdToLoad}/approvals?status=pending`);
    if (sessionIdToLoad !== currentSessionId) return;
    pendingApprovals = data.approvals || [];
    renderApprovalList();
    updateApprovalBadge();
  } catch (e) {
    console.error('加载待审批失败:', e);
  }
}

function toggleApprovalPanel(force) {
  const show = typeof force === 'boolean' ? force : approvalPanel.classList.contains('hidden');
  approvalPanel.classList.toggle('hidden', !show);
}

function respondToApproval(approvalId, allowed) {
  sendJson('permission.response', { request_id: approvalId, allowed });
  removePendingApproval(approvalId);
  if (!pendingApprovals.length) {
    toggleApprovalPanel(false);
  }
}

async function api(path, opts = {}) {
  const normalizedPath = path.startsWith('/api/') ? path : `/api${path}`;
  const res = await fetch(`${API_BASE}${normalizedPath}`, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers },
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// 会话管理
// ═══════════════════════════════════════════════════════
async function createNewSession() {
  try {
    const data = await api('/sessions', {
      method: 'POST',
      body: JSON.stringify({ title: '', permission_mode: 'safe' }),
    });
    await switchSession(data.session_id);
  } catch (e) {
    console.error('创建会话失败:', e);
  }
}

async function resumeSession(id) {
  try {
    artifacts = [];
    selectedArtifactId = null;
    renderArtifactList();

    const data = await api(`/sessions/${id}/resume`, { method: 'POST' });
    
    // 恢复消息到 UI
    clearMessages();
    if (data.messages) {
      data.messages.forEach(m => {
        if (m.role === 'user') {
          addMsg('user', m.content);
        } else if (m.role === 'assistant') {
          addMsg('assistant', m.content);
        } else if (m.role === 'tool_result' || m.role === 'tool') {
          createToolCard(m.tool_name || '?', m.tool_input);
          updateToolCard(activeToolCard || document.querySelector('.tool-card:last-child'), m.content || m.tool_output, m.is_error);
        } else if (m.role === 'system') {
          addMsg('system', m.content);
        }
      });
    }
    
    // 更新 session id 并连接 WS
    sessionId = id;
    currentSessionId = id;
    connect();
    await loadPendingApprovals(id);
    await loadArtifacts(id);
    
    // 更新 topbar
    topbarTitle.textContent = data.session.title || '新对话';
    msgCountInfo.textContent = `${data.session.message_count} 条消息`;
    loadSessions();
  } catch (e) {
    console.error('恢复会话失败:', e);
    addMsg('error', '恢复会话失败: ' + e.message);
  }
}

async function deleteSession(id) {
  if (!confirm('确定删除这个会话？')) return;
  try {
    await api(`/sessions/${id}`, { method: 'DELETE' });
    if (currentSessionId === id) {
      createNewSession();
    }
    loadSessions();
  } catch (e) {
    console.error('删除失败:', e);
  }
}

async function renameSession(id) {
  const title = prompt('新标题:');
  if (!title) return;
  try {
    await api(`/sessions/${id}/title`, {
      method: 'PUT',
      body: JSON.stringify({ title }),
    });
    loadSessions();
    if (currentSessionId === id) {
      topbarTitle.textContent = title;
    }
  } catch (e) {
    console.error('重命名失败:', e);
  }
}

async function switchSession(id) {
  if (id === currentSessionId) return;
  
  // 关闭当前 WS 连接
  if (ws && ws.readyState === WebSocket.OPEN) {
    sendJson('session.shutdown', {});
  }
  
  // 切换
  sessionId = id;
  currentSessionId = id;
  
  // 恢复
  await resumeSession(id);
  
  // 高亮
  loadSessions();
}

// 消息显示

function clearMessages() {
  messagesEl.innerHTML = '';
  welcomeArea.classList.remove('hidden');
  activeToolCard = null;
  toolCounter = 0;
  window._assistantMsg = null;
}

// ═══════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════
function connect() {
  statusText.textContent = '正在连接...';
  
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.close();
  }

  ws = new WebSocket(`${WS_BASE}/ws/${sessionId}`);

  ws.onopen = () => {
    connBadge.className = 'badge connected';
    connBadge.textContent = '● 已连接';
    statusText.textContent = `已连接 · ${getPermissionModeMeta(currentPermissionMode).status}`;
    setBusy(false);
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleEvent(data);
    } catch (err) {
      console.error('[WS] parse error:', err, e.data);
    }
  };

  ws.onerror = () => {
    statusText.textContent = '连接失败';
  };

  ws.onclose = () => {
    connBadge.className = 'badge disconnected';
    connBadge.textContent = '● 未连接';
    statusText.textContent = '连接已断开';
    setBusy(false);
    hidePermissionMenu();
  };
}

function sendJson(type, payload) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type, payload }));
}

// ═══════════════════════════════════════════════════════
// 事件渲染
// ═══════════════════════════════════════════════════════
function handleEvent(data) {
  const type = data.type;
  const payload = data.payload || {};

  switch (type) {
    case 'session.ready':
      if (payload.mode) {
        setPermissionModeUI(payload.mode);
      }
      setBusy(false);
      statusText.textContent = `已连接 · ${getPermissionModeMeta(currentPermissionMode).status}`;
      msgInput.focus();
      break;

    case 'session.run_complete':
      setBusy(false);
      addMsg('system', '— 本轮完成 —');
      window._assistantMsg = null;
      // 刷新会话列表（标题可能已自动生成）
      loadSessions();
      break;

    case 'session.closed':
      setBusy(false);
      addMsg('system', '🔌 会话已关闭');
      break;

    case 'session.busy':
      addMsg('error', '⏳ 会话繁忙中');
      break;

    case 'assistant.delta': {
      setTyping('思考中');
      if (!window._assistantMsg) {
        window._assistantMsg = document.createElement('div');
        window._assistantMsg.className = 'msg assistant cursor has-copy';
        window._assistantMsg.textContent = '';
        window._assistantMsg.dataset.rawContent = '';
        attachCopyButton(window._assistantMsg, () => window._assistantMsg?.dataset.rawContent || '');
        messagesEl.appendChild(window._assistantMsg);
      }
      window._assistantMsg._rawText = (window._assistantMsg._rawText || '') + (payload.text || '');
      window._assistantMsg.dataset.rawContent = window._assistantMsg._rawText;
      window._assistantMsg.textContent += (payload.text || '');
      scrollBottom();
      break;
    }

    case 'assistant.complete': {
      setTyping('');
      if (window._assistantMsg) {
        window._assistantMsg.classList.remove('cursor');
        const raw = window._assistantMsg._rawText;
        if (raw && raw.trim()) {
          window._assistantMsg.innerHTML = renderMd(raw);
          window._assistantMsg.dataset.rawContent = raw;
          attachCopyButton(window._assistantMsg, () => window._assistantMsg?.dataset.rawContent || '');
        }
        window._assistantMsg = null;
      }
      scrollBottom();
      break;
    }

    case 'tool.started': {
      const card = createToolCard(payload.tool_name, payload.tool_input);
      setTyping(`正在执行 ${payload.tool_name}`);
      break;
    }

    case 'tool.completed': {
      loadArtifacts(currentSessionId);
      if (activeToolCard) {
        updateToolCard(activeToolCard, payload.output, payload.is_error);
      } else {
        const card = createToolCard(payload.tool_name, {});
        updateToolCard(card, payload.output, payload.is_error);
      }
      break;
    }

    case 'transcript.item': {
      const role = payload.role;
      const text = payload.text || '';
      if (role === 'user') {
        if (pendingUserEcho === text) {
          pendingUserEcho = null;
        } else {
          addMsg('user', text);
        }
      }
      else if (role === 'system') addMsg('system', text);
      break;
    }

    case 'approval.request':
      upsertApproval({
        approval_id: payload.request_id,
        request_type: 'permission',
        tool_name: payload.tool_name,
        reason: payload.reason,
        status: 'pending',
        requested_at: Date.now() / 1000,
      });
      showApprovalModal(payload.request_id, payload.tool_name, payload.reason);
      setBusy(false);
      setTyping('等待审批');
      break;

    case 'question.request':
      showQuestionModal(payload.request_id, payload.question);
      setBusy(false);
      setTyping('等待回答');
      break;

    case 'error':
      addMsg('error', '❌ ' + (payload.message || JSON.stringify(payload)));
      setBusy(false);
      break;

    default:
      console.log('Event:', type, payload);
  }
}

function showQuestionModal(requestId, question) {

  div.innerHTML = `
    <h3 style="font-size:14px;color:var(--cyan);margin-bottom:6px;">💬 Agent 提问</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">${esc(question)}</p>
    <div style="display:flex;gap:8px;">
      <input type="text" class="q-input" placeholder="输入回复..." style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;" />
      <button class="q-send" style="background:var(--cyan);color:#000;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;">回复</button>
    </div>
  `;
  messagesEl.appendChild(div);
  const input = div.querySelector('.q-input');
  const btn = div.querySelector('.q-send');
  const doReply = () => {
    const answer = input.value.trim();
    div.remove();
    sendJson('question.response', { request_id: requestId, answer });
  };
  btn.addEventListener('click', doReply);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doReply(); });
  input.focus();
  scrollBottom();
}

// ═══════════════════════════════════════════════════════
// 输入交互
// ═══════════════════════════════════════════════════════
function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  hideSlashPopup();
  pendingUserEcho = text;
  addMsg('user', text);
  sendJson('session.submit', { text });
  msgInput.value = '';
  setBusy(true);
  window._assistantMsg = null;
  activeToolCard = null;
}

function stopSession() {
  sendJson('session.shutdown', {});
  setBusy(false);
}

sendBtn.addEventListener('click', sendMsg);
stopBtn.addEventListener('click', stopSession);
msgInput.addEventListener('input', renderSlashPopup);
msgInput.addEventListener('blur', () => {
  setTimeout(() => {
    if (!slashPopup.contains(document.activeElement)) hideSlashPopup();
  }, 120);
});
msgInput.addEventListener('keydown', (e) => {
  const popupOpen = !slashPopup.classList.contains('hidden') && slashMatches.length > 0;

  if (popupOpen && e.key === 'ArrowDown') {
    e.preventDefault();
    slashSelectedIndex = (slashSelectedIndex + 1) % slashMatches.length;
    renderSlashPopup();
    return;
  }

  if (popupOpen && e.key === 'ArrowUp') {
    e.preventDefault();
    slashSelectedIndex = (slashSelectedIndex - 1 + slashMatches.length) % slashMatches.length;
    renderSlashPopup();
    return;
  }

  if (!slashPopup.classList.contains('hidden') && e.key === 'Escape') {
    e.preventDefault();
    hideSlashPopup();
    return;
  }

  if (popupOpen && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    applySlashCommand(slashMatches[slashSelectedIndex].command);
    return;
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

slashList.addEventListener('mousedown', (e) => {
  const item = e.target.closest('.slash-item');
  if (!item) return;
  e.preventDefault();
  const index = Number(item.dataset.index || 0);
  if (slashMatches[index]) {
    applySlashCommand(slashMatches[index].command);
  }
});

document.addEventListener('click', (e) => {
  if (e.target !== msgInput && !slashPopup.contains(e.target)) {
    hideSlashPopup();
  }

  if (e.target === permissionBadge) {
    permissionMenu.classList.contains('hidden') ? showPermissionMenu() : hidePermissionMenu();
    return;
  }

  if (!permissionMenu.contains(e.target)) {
    hidePermissionMenu();
  }
});

permissionMenu.addEventListener('click', (e) => {
  const option = e.target.closest('.permission-option');
  if (!option) return;
  updatePermissionMode(option.dataset.mode);
});

approvalQueueBtn.addEventListener('click', () => toggleApprovalPanel());
approvalPanelClose.addEventListener('click', () => toggleApprovalPanel(false));
approvalList.addEventListener('click', (e) => {
  const button = e.target.closest('.approval-action-btn');
  if (!button) return;
  respondToApproval(button.dataset.approvalId, button.dataset.decision === 'allow');
});

artifactPanelToggle.addEventListener('click', () => {
  artifactPanel.classList.toggle('hidden');
});

artifactList.addEventListener('click', (e) => {
  const item = e.target.closest('.artifact-item');
  if (!item) return;
  showArtifact(item.dataset.artifactId);
});

exportSessionBtn.addEventListener('click', exportCurrentSession);

// ═══════════════════════════════════════════════════════
// 侧边栏
// ═══════════════════════════════════════════════════════
menuBtn.addEventListener('click', () => {
  sidebar.classList.toggle('hidden');
});

newSessionBtn.addEventListener('click', createNewSession);

searchInput.addEventListener('input', (e) => {
  renderSessionList(e.target.value);
});

// ═══════════════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════════════
async function init() {
  await loadSessions();
  
  // 如果有历史会话，恢复最后一个活跃的
  const lastActive = sessions.find(s => s.status === 'active') || sessions[0];
  if (lastActive) {
    await switchSession(lastActive.session_id);
  } else {
    await createNewSession();
  }
}

setPermissionModeUI(currentPermissionMode);
renderApprovalList();
updateApprovalBadge();
init();
</script>
</body>
</html>
